<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Your Link</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f3f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .box {
            background: #ffffff;
            padding: 35px 25px;
            border-radius: 12px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 {
            margin: 0 0 10px 0;
            color: #212529;
            font-size: 23px;
        }
        p {
            color: #6c757d;
            margin: 0 0 25px 0;
            font-size: 15px;
        }
        .btn {
            display: inline-block;
            background: #e63946;
            color: #fff;
            padding: 16px 45px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.2s ease;
        }
        .btn:hover {
            background: #d62839;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>Link Ready</h2>
        <p>Click the button below to proceed</p>
        <a href="https://plump-plastic.com/1sDozQ" target="_blank" class="btn">
            Click Here
        </a>
    </div>
</body>
</html>
