<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <style>
        body { font-family: Arial; text-align: center; padding-top: 50px; }
        .msg { font-size: 24px; color: green; }
        .error { font-size: 24px; color: red; }
    </style>
</head>
<body>
    <div id="message">
        <h2>Computer page pe le ja rahe hain...</h2>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const status = urlParams.get('status');
        const messageDiv = document.getElementById('message');

        // Step 1: Check karo user wapas aaya hai ya naya aaya hai
        if (status === 'success') {
            // Agar 22 sec poore karke aaya hai
            messageDiv.innerHTML = '<h2 class="msg">✅ Verify ho gaya! Aap 22 second ruke.</h2><p>Ab aap aage badh sakte hain.</p>';
        } else if (status === 'failed') {
            // Agar 22 sec se pehle wapas aa gaya
            messageDiv.innerHTML = '<h2 class="error">❌ Verify nahi hua! Aap 22 second nahi ruke.</h2><p>Kripya dobara try karein.</p><button onclick="goToComputer()">Dobara Try Karein</button>';
        } else {
            // Naya user hai, to COMPUTER page pe bhejo
            setTimeout(goToComputer, 1500);
        }

        function goToComputer() {
            const returnUrl = "https://srsmhospitalc-collab.github.io/SFAmaster/button2.html";
            const startTime = Date.now(); // Current time note kar lo
            // startTime bhej rahe hain verify ke liye
            window.location.href = "https://srsmhospitalc-collab.github.io/COMPUTER/?return_url=" + encodeURIComponent(returnUrl) + "&time=22&start=" + startTime;
        }
    </script>
</body>
</html>
