<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <style>
        body { font-family: Arial; text-align: center; padding-top: 50px; }
        .msg { font-size: 24px; color: green; }
        .error { font-size: 24px; color: red; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="message">
        <h2>Cycle page pe le ja rahe hain...</h2>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const status = urlParams.get('status');
        const messageDiv = document.getElementById('message');

        if (status === 'success') {
            messageDiv.innerHTML = '<h2 class="msg">✅ Verify ho gaya! Aap 22 second cycle page pe ruke.</h2>';
        } else if (status === 'failed') {
            messageDiv.innerHTML = '<h2 class="error">❌ Verify nahi hua! Aap 22 second nahi ruke.</h2><button onclick="goToCycle()">Dobara Try Karein</button>';
        } else {
            setTimeout(goToCycle, 1000);
        }

        function goToCycle() {
            const returnUrl = "https://srsmhospitalc-collab.github.io/SFAmaster/button4.html";
            const startTime = Date.now(); 
            window.location.href = "https://srsmhospitalc-collab.github.io/cycle/?return_url=" + encodeURIComponent(returnUrl) + "&time=22&start=" + startTime;
        }
    </script>
</body>
</html>
