<!-- Timer + Auto Scroll Box -->
<div id="timer-box" style="position:fixed; top:10px; right:10px; background:#388e3c; color:white; padding:12px 20px; border-radius:8px; font-size:16px; font-weight:bold; z-index:9999; text-align:center;">
    <div>Screen ko dheere dheere scroll kare</div>
    <div>⏱️ Rukiye: <span id="countdown">22</span>s</div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const returnUrl = urlParams.get('return_url');
    const startTime = parseInt(urlParams.get('start'));
    let timeLeft = parseInt(urlParams.get('time')) || 22;

    const countdownElement = document.getElementById('countdown');
    const timerBox = document.getElementById('timer-box');
    
    if (returnUrl && startTime) {
        // Auto Scroll
        let scrollPosition = 0;
        const autoScroll = setInterval(function() {
            if (window.innerHeight + window.scrollY < document.body.offsetHeight) {
                scrollPosition += 1;
                window.scrollTo(0, scrollPosition);
            }
        }, 100);

        // Timer
        const timer = setInterval(function() {
            timeLeft--;
            countdownElement.textContent = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(timer);
                clearInterval(autoScroll);
                
                const timeSpent = (Date.now() - startTime) / 1000;
                if (timeSpent >= 21) {
                    window.location.href = decodeURIComponent(returnUrl) + "?status=success";
                } else {
                    window.location.href = decodeURIComponent(returnUrl) + "?status=failed";
                }
            }
        }, 1000);
    } else {
        timerBox.style.display = 'none';
    }
</script>
